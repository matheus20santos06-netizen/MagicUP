<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guerreiros Z vs Tropa Freeza</title>
    <style>
        /* --- ESTILOS GERAIS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #120326;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background: linear-gradient(to bottom, #1a0b2e, #3a1c5c);
            border: 4px solid #4a2574;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .active { display: flex; }

        h1, h2 {
            text-align: center;
            text-shadow: 2px 2px #000;
            margin-bottom: 20px;
            color: #ffcc00;
        }

        button {
            background: linear-gradient(to bottom, #ff9900, #ff5500);
            border: 2px solid #fff;
            border-radius: 8px;
            color: white;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 1px 1px #000;
            box-shadow: 0 4px #993300;
            transition: 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 #000;
        }

        /* --- TELA DE MENU / ENTRADA --- */
        #menu-screen {
            justify-content: center;
            background: radial-gradient(circle, #2d1b4e 0%, #0f071a 100%);
        }
        .logo-placeholder {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 3px 3px 0px #ff3300, 6px 6px 0px #000;
            margin-bottom: 50px;
            text-align: center;
        }

        /* --- TELA DE SELEÇÃO (EQUIPE) --- */
        .char-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
            overflow-y: auto;
            padding: 5px;
        }
        .char-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #555;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .char-card.selected {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.2);
            box-shadow: 0 0 10px #ffcc00;
        }
        .char-avatar {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .char-power {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* --- TELA VERSUS --- */
        #vs-screen {
            justify-content: center;
            background: #222;
        }
        .vs-circle {
            width: 120px;
            height: 120px;
            background: #ffcc00;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: #ff3300;
            border: 5px solid #fff;
            box-shadow: 0 0 20px #ffcc00;
            margin: 40px 0;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); } to { transform: scale(1.1); }
        }

        /* --- TELA DE COMBATE --- */
        .battle-stage {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            background: linear-gradient(to bottom, #4da6ff, #e6f2ff);
            border-radius: 8px;
            padding: 20px;
            border: 3px solid #333;
        }
        .fighter {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
            z-index: 2;
        }
        .fighter-img { font-size: 3.5rem; transition: 0.3s; }
        .hp-bar-container {
            width: 100%;
            background: #555;
            border: 2px solid #000;
            border-radius: 4px;
            height: 15px;
            margin-top: 5px;
            overflow: hidden;
        }
        .hp-bar {
            width: 100%;
            height: 100%;
            background: #00ff00;
            transition: width 0.3s ease;
        }
        .ki-bar-container {
            width: 100%;
            background: #444;
            border: 1px solid #000;
            border-radius: 4px;
            height: 8px;
            margin-top: 3px;
        }
        .ki-bar {
            width: 0%;
            height: 100%;
            background: #00ccff;
            transition: width 0.3s ease;
        }
        .battle-log {
            height: 80px;
            width: 100%;
            background: rgba(0,0,0,0.8);
            border: 2px solid #ffcc00;
            border-radius: 6px;
            margin: 15px 0;
            padding: 10px;
            font-size: 0.9rem;
            overflow-y: auto;
            color: #fff;
        }
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
        }
        .action-btn {
            padding: 10px;
            font-size: 0.85rem;
        }

        /* Animações de impacto */
        .hit { animation: shake 0.2s; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="menu-screen" class="screen active">
            <div class="logo-placeholder">GUERREIROS Z<br><span style="font-size:1.5rem; color:#fff;">BATALHA</span></div>
            <button onclick="changeScreen('select-screen')">JOGAR</button>
        </div>

        <div id="select-screen" class="screen">
            <h2>Escolha seu Guerreiro</h2>
            <div class="char-grid" id="available-chars"></div>
            <button id="confirm-select-btn" onclick="startVersus()" disabled>Confirmar Equipe</button>
        </div>

        <div id="vs-screen" class="screen">
            <h2 style="color:#ff3300;">CONFRONTO</h2>
            <div id="vs-player" style="font-size: 1.5rem;">Guerreiro</div>
            <div class="vs-circle">VS</div>
            <div id="vs-enemy" style="font-size: 1.5rem; color:#ff4444;">Inimigo</div>
        </div>

        <div id="battle-screen" class="screen">
            <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px;">
                <span id="stage-indicator">Fase: 1</span>
                <span id="chances-indicator">Chances: 3/3</span>
            </div>
            
            <div class="battle-stage">
                <div class="fighter" id="player-fighter">
                    <div class="fighter-img" id="p-img">🧑‍🦲</div>
                    <div id="p-name">Kuririn</div>
                    <div class="hp-bar-container"><div class="hp-bar" id="p-hp"></div></div>
                    <div class="ki-bar-container"><div class="ki-bar" id="p-ki"></div></div>
                </div>
                
                <div class="fighter" id="enemy-fighter">
                    <div class="fighter-img" id="e-img">👽</div>
                    <div id="e-name">Freeza</div>
                    <div class="hp-bar-container"><div class="hp-bar" id="e-hp"></div></div>
                    <div class="ki-bar-container"><div class="ki-bar" id="e-ki"></div></div>
                </div>
            </div>

            <div class="battle-log" id="log-box">A batalha começou! Seu turno.</div>

            <div class="actions-grid">
                <button class="action-btn" onclick="playerAction('soco')">🥊 Soco</button>
                <button class="action-btn" onclick="playerAction('bola')">☄️ Bola de Poder (1 Ki)</button>
                <button class="action-btn" onclick="playerAction('combo')">🥾 Chute + Soco (2 Ki)</button>
                <button class="action-btn" onclick="playerAction('mega')">💥 Mega Bola (3 Ki)</button>
                <button class="action-btn" style="background: #00ccff;" onclick="playerAction('carregar')">⚡ Carregar Ki</button>
                <button class="action-btn" style="background: #00ff66; color: black;" onclick="playerAction('curar')">💊 Recuperar Vida</button>
            </div>
        </div>

    </div>

    <script>
        // --- BANCO DE DADOS DO JOGO ---
        const ALL_CHARACTERS = [
            { id: 'kuririn', name: 'Kuririn', avatar: '🧑‍🦲', hp: 100, maxHp: 100, basePower: 22353, levelRequired: 1 },
            { id: 'mestre', name: 'Mestre Kame', avatar: '🐢', hp: 110, maxHp: 110, basePower: 15471, levelRequired: 1 },
            { id: 'piccolo', name: 'Piccolo', avatar: '🧝‍♂️', hp: 140, maxHp: 140, basePower: 111175, levelRequired: 2 },
            { id: 'goku', name: 'Goku Base', avatar: '🥋', hp: 150, maxHp: 150, basePower: 341113, levelRequired: 3 },
            { id: 'goku-blue', name: 'Goku Blue', avatar: '🥶', hp: 250, maxHp: 250, basePower: 369420, levelRequired: 5 }
        ];

        const ENEMIES_POOL = [
            { name: 'Soldado Guldo', avatar: '🦎', hp: 80, maxHp: 80, damage: 10 },
            { name: 'Zarbon', avatar: '👹', hp: 120, maxHp: 120, damage: 15 },
            { name: 'Freeza Forma 1', avatar: '👽', hp: 180, maxHp: 180, damage: 22 },
            { name: 'Freeza Forma Final', avatar: '😈', hp: 300, maxHp: 300, damage: 35 }
        ];

        // --- ESTADO DO JOGO ---
        let currentLevel = 1;
        let playerChances = 3;
        let selectedCharacter = null;
        let activePlayer = null;
        let activeEnemy = null;
        let playerKi = 0;
        let enemyKi = 0;
        let isPlayerTurn = true;

        // --- SISTEMA DE TELAS ---
        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'select-screen') renderSelectionGrid();
        }

        // --- RENDERIZAR SELEÇÃO DE PERSONAGENS ---
        function renderSelectionGrid() {
            const grid = document.getElementById('available-chars');
            grid.innerHTML = '';
            
            ALL_CHARACTERS.forEach(char => {
                const isUnlocked = currentLevel >= char.levelRequired;
                const card = document.createElement('div');
                card.className = `char-card ${!isUnlocked ? 'disabled' : ''}`;
                card.style.opacity = isUnlocked ? '1' : '0.4';
                
                card.innerHTML = `
                    <div class="char-avatar">${char.avatar}</div>
                    <strong>${char.name}</strong>
                    <div class="char-power">Poder: ${char.basePower}</div>
                    <div style="font-size:0.7rem; color: #ffcc00">${!isUnlocked ? `Libera na Fase ${char.levelRequired}` : 'Disponível'}</div>
                `;
                
                if(isUnlocked) {
                    card.onclick = () => {
                        document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                        selectedCharacter = char;
                        document.getElementById('confirm-select-btn').disabled = false;
                    };
                }
                grid.appendChild(card);
            });
        }

        // --- SISTEMA DE VERSUS ---
        function startVersus() {
            activePlayer = { ...selectedCharacter, hp: selectedCharacter.maxHp };
            // Define o inimigo baseado no nível atual (limita ao tamanho da lista)
            let enemyIndex = Math.min(currentLevel - 1, ENEMIES_POOL.length - 1);
            activeEnemy = { ...ENEMIES_POOL[enemyIndex] };

            document.getElementById('vs-player').innerText = `${activePlayer.avatar} ${activePlayer.name}`;
            document.getElementById('vs-enemy').innerText = `${activeEnemy.name} ${activeEnemy.avatar}`;
            
            changeScreen('vs-screen');

            setTimeout(() => {
                initBattle();
            }, 2500); // 2.5 segundos de tela Versus
        }

        // --- INICIALIZAÇÃO DA BATALHA ---
        function initBattle() {
            playerKi = 0;
            enemyKi = 0;
            isPlayerTurn = true;
            
            document.getElementById('stage-indicator').innerText = `Fase: ${currentLevel}`;
            document.getElementById('chances-indicator').innerText = `Chances: ${playerChances}/3`;
            
            document.getElementById('p-name').innerText = activePlayer.name;
            document.getElementById('p-img').innerText = activePlayer.avatar;
            document.getElementById('e-name').innerText = activeEnemy.name;
            document.getElementById('e-img').innerText = activeEnemy.avatar;

            updateBars();
            document.getElementById('log-box').innerText = `Seu ${activePlayer.name} entrou na arena contra ${activeEnemy.name}! Faça sua jogada.`;
            changeScreen('battle-screen');
        }

        // --- ATUALIZAR BARRAS DE STATUS ---
        function updateBars() {
            const pXpPercent = (activePlayer.hp / activePlayer.maxHp) * 100;
            const eXpPercent = (activeEnemy.hp / activeEnemy.maxHp) * 100;

            document.getElementById('p-hp').style.width = `${Math.max(0, pXpPercent)}%`;
            document.getElementById('e-hp').style.width = `${Math.max(0, eXpPercent)}%`;

            // O limite max de Ki aqui simulado é 3 barras
            document.getElementById('p-ki').style.width = `${(playerKi / 3) * 100}%`;
            document.getElementById('e-ki').style.width = `${(enemyKi / 3) * 100}%`;
        }

        // --- LÓGICA DE TURNOS E ATAQUES ---
        function playerAction(action) {
            if (!isPlayerTurn) return;

            let dmg = 0;
            let logText = "";
            let cost = 0;

            switch(action) {
                case 'soco':
                    dmg = 12 + Math.floor(Math.random() * 6);
                    activeEnemy.hp -= dmg;
                    logText = `Você desferiu um Soco certeiro causando ${dmg} de dano!`;
                    animateHit('enemy-fighter');
                    break;
                case 'bola':
                    if (playerKi >= 1) {
                        dmg = 25 + Math.floor(Math.random() * 10);
                        activeEnemy.hp -= dmg;
                        playerKi -= 1;
                        logText = `Você lançou uma Bola de Poder! Dano de ${dmg}!`;
                        animateHit('enemy-fighter');
                    } else {
                        alert("Ki insuficiente!"); return;
                    }
                    break;
                case 'combo':
                    if (playerKi >= 2) {
                        dmg = 40 + Math.floor(Math.random() * 15);
                        activeEnemy.hp -= dmg;
                        playerKi -= 2;
                        logText = `💥 Duplo impacto! Chute + Soco causou ${dmg} de dano!`;
                        animateHit('enemy-fighter');
                    } else {
                        alert("Ki insuficiente!"); return;
                    }
                    break;
                case 'mega':
                    if (playerKi >= 3) {
                        dmg = 70 + Math.floor(Math.random() * 20);
                        activeEnemy.hp -= dmg;
                        playerKi -= 3;
                        logText = `☄️ PODER MÁXIMO! A Mega Bola explodiu causando ${dmg} de dano!`;
                        animateHit('enemy-fighter');
                    } else {
                        alert("Ki insuficiente para o Especial!"); return;
                    }
                    break;
                case 'carregar':
                    if (playerKi < 3) {
                        playerKi++;
                        logText = `Você concentrou sua energia! +1 Barra de Ki.`;
                    } else {
                        logText = `Seu Ki já está no limite máximo!`;
                    }
                    break;
                case 'curar':
                    let heal = 30;
                    activePlayer.hp = Math.min(activePlayer.maxHp, activePlayer.hp + heal);
                    logText = `Você usou uma Semente dos Deuses e recuperou ${heal} de Vida.`;
                    break;
            }

            document.getElementById('log-box').innerText = logText;
            updateBars();

            if (activeEnemy.hp <= 0) {
                setTimeout(winMatch, 1000);
            } else {
                isPlayerTurn = false;
                setTimeout(enemyTurn, 1500);
            }
        }

        // --- TURNO DO INIMIGO AI SIMPLES ---
        function enemyTurn() {
            let logText = "";
            // Inimigo carrega Ki aleatoriamente ou ataca baseado no Ki acumulado
            if (enemyKi < 2 && Math.random() > 0.6) {
                enemyKi++;
                logText = `${activeEnemy.name} está carregando o Ki de forma ameaçadora!`;
            } else if (enemyKi >= 2) {
                let dmg = activeEnemy.damage + 15;
                activePlayer.hp -= dmg;
                enemyKi -= 2;
                logText = `🚨 ${activeEnemy.name} usou o Ataque Especial dele! Você sofreu ${dmg} de dano!`;
                animateHit('player-fighter');
            } else {
                let dmg = activeEnemy.damage + Math.floor(Math.random() * 5);
                activePlayer.hp -= dmg;
                logText = `${activeEnemy.name} avançou com golpes corporais e tirou ${dmg} de HP seu.`;
                animateHit('player-fighter');
            }

            document.getElementById('log-box').innerText = logText;
            updateBars();

            if (activePlayer.hp <= 0) {
                setTimeout(loseMatch, 1000);
            } else {
                isPlayerTurn = true;
            }
        }

        // --- CORREÇÃO DE ANIMAÇÃO DE IMPACTO ---
        function animateHit(targetId) {
            const el = document.getElementById(targetId);
            el.classList.add('hit');
            setTimeout(() => el.classList.remove('hit'), 200);
        }

        // --- VITÓRIA E DERROTA ---
        function winMatch() {
            alert(`Parabéns! Você venceu a Fase ${currentLevel}!`);
            currentLevel++;
            changeScreen('select-screen'); // Volta para escolher novos personagens liberados
        }

        function loseMatch() {
            playerChances--;
            if (playerChances > 0) {
                alert(`Seu personagem desmaiou! Você perdeu 1 chance. Chances restantes: ${playerChances}`);
                startVersus(); // Reinicia a tentativa da fase atual
            } else {
                alert("Fim de Jogo! Suas chances acabaram. Retornando ao menu principal.");
                currentLevel = 1;
                playerChances = 3;
                changeScreen('menu-screen');
            }
        }
    </script>
</body>
</html>
