<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Arena Extreme P2P</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container Responsivo Adaptável para qualquer tamanho de tela (A02 até Tablets grandes) */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1024px;
            max-height: 576px;
            aspect-ratio: 16/9;
            background: linear-gradient(to bottom, #0f001a, #2b002b, #0f001a);
            border: 2px solid #333;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .scenery { position: absolute; width: 100%; height: 100%; bottom: 0; }
        .floor {
            position: absolute;
            bottom: 0; width: 100%; height: 20%;
            background: #151515;
            border-top: 6px solid #ff0055;
            box-shadow: 0 -5px 15px rgba(255, 0, 85, 0.4);
        }

        /* HUD Compacto para telas menores */
        .hud {
            position: absolute;
            top: 10px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 20px; z-index: 10;
        }

        .player-block { width: 45%; }
        .bar-container {
            background: #333; border: 2px solid #fff; height: 20px; margin-bottom: 4px; position: relative;
        }
        .health-bar { width: 100%; height: 100%; background: #00ff00; transition: width 0.1s ease; }
        .sp-container { background: #222; border: 1px solid #aaa; height: 8px; position: relative; }
        .sp-bar { width: 0%; height: 100%; background: #00ffff; transition: width 0.2s; }

        .player-info { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .hit-counter { font-size: 1.2rem; color: #ffcc00; font-weight: bold; display: none; text-shadow: 0 0 4px #000; }

        /* Personagens em CSS Puro */
        .player {
            position: absolute; width: 60px; height: 110px; bottom: 20%; display: flex; justify-content: center; align-items: center;
        }

        .body-sprite { position: relative; width: 100%; height: 100%; }
        .head { width: 30px; height: 30px; border-radius: 50%; position: absolute; top: 0; left: 15px; border: 2px solid #fff; }
        .torso { width: 40px; height: 50px; position: absolute; top: 30px; left: 10px; border-radius: 8px; border: 2px solid #fff; }
        .arm { width: 30px; height: 12px; background: #fff; position: absolute; top: 38px; left: 35px; transform-origin: left center; transition: 0.05s; border-radius: 4px; }
        .leg { width: 12px; height: 30px; background: #fff; position: absolute; bottom: 0; }
        .leg.left { left: 12px; }
        .leg.right { left: 36px; }

        #p1 .head, #p1 .torso { background: #ff0055; box-shadow: 0 0 10px #ff0055; }
        #p1 .arm, #p1 .leg { background: #ff4081; }
        #p2 .head, #p2 .torso { background: #00e5ff; box-shadow: 0 0 10px #00e5ff; }
        #p2 .arm, #p2 .leg { background: #80f3ff; }
        #p2 .arm { left: auto; right: 35px; transform-origin: right center; }

        /* Estados Visuais Animados */
        .punching .arm { transform: scaleX(1.8) rotate(-10deg); }
        .combo1 .arm { transform: scaleX(2.2) rotate(15deg); background: #ffcc00 !important; }
        .combo2 .arm { transform: scaleY(2) scaleX(1.5) translateY(5px); background: #00ff00 !important; }
        .special-anim .arm { transform: scaleX(3) rotate(-30deg); background: #ff00ff !important; box-shadow: 0 0 15px #ff00ff; }
        .stunned { opacity: 0.5; transform: skewX(-15deg) !important; }

        /* Camada de Controles Touch Sob Medida */
        .controls-layer {
            position: absolute; bottom: 5px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; pointer-events: none; z-index: 50;
        }
        .touch-btn {
            width: 60px; height: 60px; background: rgba(255, 255, 255, 0.12); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.1rem; color: #fff; pointer-events: auto;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.4); }
        .d-pad, .action-pad { display: flex; gap: 10px; }
        #btn-sp { background: rgba(255, 0, 255, 0.1); border-color: rgba(255, 0, 255, 0.4); display: none; }

        .pause-trigger {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px;
            background: rgba(255,255,255,0.1); border: 1px solid #fff; border-radius: 5px; display: flex; justify-content: center; align-items: center; z-index: 60;
        }

        /* Menus */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); padding: 15px;
        }
        .hidden { display: none !important; }
        h1 { font-size: 2.2rem; color: #ff0055; text-shadow: 0 0 8px #ff0055; margin-bottom: 15px; text-align: center; }
        .btn { padding: 10px 25px; font-size: 1rem; background: transparent; color: #fff; border: 2px solid #fff; cursor: pointer; margin: 8px; font-family: inherit; }
        .lobby-box { background: #1a1a1a; padding: 15px; border-radius: 6px; text-align: center; margin: 8px; width: 90%; max-width: 360px; }
        .lobby-box input { width: 100%; padding: 8px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; text-align: center; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="scenery"><div class="floor"></div></div>
        <div class="pause-trigger" onclick="requestPause()">⏸</div>

        <div class="hud">
            <div class="player-block">
                <div class="player-info" id="p1-tag">P1 (Você)</div>
                <div class="bar-container"><div id="p1-health" class="health-bar"></div></div>
                <div class="sp-container"><div id="p1-sp" class="sp-bar"></div></div>
                <div id="p1-hits" class="hit-counter">0 HITS</div>
            </div>
            <div class="player-block">
                <div class="player-info" id="p2-tag">P2 (Rival)</div>
                <div class="bar-container"><div id="p2-health" class="health-bar" style="float: right;"></div></div>
                <div class="sp-container"><div id="p2-sp" class="sp-bar" style="float: right;"></div></div>
                <div id="p2-hits" class="hit-counter" style="text-align: right;">0 HITS</div>
            </div>
        </div>

        <div id="p1" class="player" style="left: 15%;"><div class="body-sprite"><div class="head"></div><div class="torso"></div><div class="arm"></div><div class="leg left"></div><div class="leg right"></div></div></div>
        <div id="p2" class="player" style="left: 75%;"><div class="body-sprite"><div class="head"></div><div class="torso"></div><div class="arm"></div><div class="leg left"></div><div class="leg right"></div></div></div>

        <div class="controls-layer">
            <div class="d-pad">
                <div class="touch-btn" id="btn-left">◀</div>
                <div class="touch-btn" id="btn-jump">▲</div>
                <div class="touch-btn" id="btn-right">▶</div>
            </div>
            <div class="action-pad">
                <div class="touch-btn" id="btn-sp">SP</div>
                <div class="touch-btn" id="btn-low" style="background: rgba(0, 229, 255, 0.15);">B</div>
                <div class="touch-btn" id="btn-high" style="background: rgba(255, 0, 85, 0.15);">C</div>
            </div>
        </div>

        <div id="main-menu" class="screen">
            <h1>RETRO ARENA REAL WLAN</h1>
            <p id="status-text" style="color: #00ffcc; margin-bottom: 10px;">Iniciando PeerJS...</p>
            <div class="lobby-box">
                <p>ID deste dispositivo:</p>
                <input type="text" id="my-id" readonly onclick="this.select()">
            </div>
            <div class="lobby-box">
                <p>Conectar ao outro dispositivo:</p>
                <input type="text" id="peer-id-input" placeholder="Cole o ID do rival">
                <button class="btn" onclick="connectToPeer()">CONECTAR</button>
            </div>
        </div>

        <div id="pause-menu" class="screen hidden">
            <h1>JOGO PAUSADO</h1>
            <button class="btn" onclick="requestResume()">RETOMAR</button>
            <button class="btn" onclick="requestReset()">REINICIAR</button>
        </div>

        <div id="game-over-menu" class="screen hidden">
            <h1 id="winner-text">FIM DE JOGO</h1>
            <button class="btn" onclick="requestReset()">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        const config = { gravity: 0.6, speed: 6, maxH: 100 };
        
        let localPlayer = { id: 'p1', el: document.getElementById('p1'), x: 150, y: 0, vx: 0, vy: 0, isJumping: false, health: 100, sp: 0, direction: 1, lastKeys: [], cooldown: false, hits: 0, isStunned: false };
        let remotePlayer = { id: 'p2', el: document.getElementById('p2'), x: 700, y: 0, health: 100, sp: 0, direction: -1, hits: 0, isStunned: false };

        let peer = null, conn = null, isHost = false, gameActive = false, isPaused = false;
        let touch = { left: false, right: false };

        function init() {
            peer = new Peer();
            peer.on('open', id => {
                document.getElementById('my-id').value = id;
                document.getElementById('status-text').innerText = "Rede P2P ativa. Pronto!";
            });
            peer.on('connection', connection => {
                conn = connection; isHost = true; setupConnection();
            });
            setupTouch();
        }

        function connectToPeer() {
            let targetId = document.getElementById('peer-id-input').value.trim();
            if(!targetId) return;
            document.getElementById('status-text').innerText = "Conectando...";
            conn = peer.connect(targetId);
            isHost = false;
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('main-menu').classList.add('hidden');
                document.getElementById('p1-tag').innerText = isHost ? "P1 (Você)" : "P2 (Você)";
                document.getElementById('p2-tag').innerText = isHost ? "P2 (Rival)" : "P1 (Rival)";
                gameActive = true;
                gameLoop();
            });

            conn.on('data', data => {
                if (data.type === 'move') {
                    remotePlayer.x = data.x;
                    remotePlayer.y = data.y;
                    remotePlayer.direction = data.dir;
                }
                if (data.type === 'status') {
                    remotePlayer.health = data.health;
                    remotePlayer.sp = data.sp;
                    remotePlayer.isStunned = data.stun;
                    localPlayer.health = data.myHealth; // Sincronização de dano real
                }
                if (data.type === 'action') {
                    animateRemote(data.anim);
                    if(data.hit) showHitCounter(remotePlayer);
                }
                if (data.type === 'pause') { isPaused = true; document.getElementById('pause-menu').classList.remove('hidden'); }
                if (data.type === 'resume') { isPaused = false; document.getElementById('pause-menu').classList.add('hidden'); gameLoop(); }
                if (data.type === 'reset') { resetState(); }
            });
        }

        function setupTouch() {
            const bind = (id, start, end) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', e => { e.preventDefault(); start(); });
                el.addEventListener('touchend', e => { e.preventDefault(); end(); });
            };
            bind('btn-left', () => touch.left = true, () => touch.left = false);
            bind('btn-right', () => touch.right = true, () => touch.right = false);
            bind('btn-jump', () => { if(!localPlayer.isJumping && !localPlayer.isStunned) { localPlayer.vy = -13; localPlayer.isJumping = true; } }, () => {});
            bind('btn-low', () => handleAttack('baixo'), () => {});
            bind('btn-high', () => handleAttack('cima'), () => {});
            bind('btn-sp', () => handleSpecial(), () => {});
        }

        function handleAttack(type) {
            if (localPlayer.cooldown || localPlayer.isStunned || !gameActive) return;
            localPlayer.cooldown = true;
            
            localPlayer.lastKeys.push({ type: type, time: Date.now() });
            if (localPlayer.lastKeys.length > 4) localPlayer.lastKeys.shift();

            let anim = 'punching';
            let damage = 4;
            let comboText = checkCombos();

            if (comboText) {
                if(comboText.includes('TRIPLO')) { anim = 'combo1'; damage = 12; }
                if(comboText.includes('GANCHO')) { anim = 'combo2'; damage = 10; }
            }

            localPlayer.el.classList.add(anim);
            
            // Validação de colisão local
            let hitRegistered = false;
            let containerWidth = document.getElementById('game-container').offsetWidth;
            let distance = Math.abs(localPlayer.x - remotePlayer.x);
            
            if (distance < (containerWidth * 0.12) && Math.abs(localPlayer.y - remotePlayer.y) < 50) {
                hitRegistered = true;
                remotePlayer.health -= damage;
                localPlayer.sp = Math.min(100, localPlayer.sp + 15);
                showHitCounter(localPlayer);
            } else {
                localPlayer.hits = 0;
                document.getElementById('p1-hits').style.display = 'none';
            }

            if(conn) conn.send({ type: 'action', anim: anim, hit: hitRegistered });
            sendState();

            setTimeout(() => {
                localPlayer.el.classList.remove('punching', 'combo1', 'combo2');
                localPlayer.cooldown = false;
            }, 180);
        }

        function checkCombos() {
            const now = Date.now();
            localPlayer.lastKeys = localPlayer.lastKeys.filter(k => now - k.time < 1000);
            let seq = localPlayer.lastKeys.map(k => k.type).join('-');
            
            if (seq.endsWith('cima-cima-cima') || seq.endsWith('baixo-baixo-baixo')) return 'TRIPLO';
            if (seq.endsWith('baixo-cima')) return 'GANCHO';
            return null;
        }

        function handleSpecial() {
            if(localPlayer.sp < 100 || localPlayer.isStunned) return;
            localPlayer.sp = 0;
            localPlayer.cooldown = true;
            
            localPlayer.el.classList.add('special-anim');
            
            let containerWidth = document.getElementById('game-container').offsetWidth;
            if (Math.abs(localPlayer.x - remotePlayer.x) < (containerWidth * 0.18)) {
                remotePlayer.isStunned = true; // Paralisa Rival
                if(conn) conn.send({ type: 'action', anim: 'special-anim', hit: true });
                
                // Sequência de hits automáticos do especial durante a paralisia
                let hitsCount = 0;
                let interval = setInterval(() => {
                    remotePlayer.health -= 6;
                    showHitCounter(localPlayer);
                    sendState();
                    hitsCount++;
                    if(hitsCount >= 5) {
                        clearInterval(interval);
                        remotePlayer.isStunned = false;
                        localPlayer.el.classList.remove('special-anim');
                        localPlayer.cooldown = false;
                        sendState();
                    }
                }, 250);
            } else {
                if(conn) conn.send({ type: 'action', anim: 'special-anim', hit: false });
                setTimeout(() => {
                    localPlayer.el.classList.remove('special-anim');
                    localPlayer.cooldown = false;
                }, 500);
            }
            sendState();
        }

        function showHitCounter(player) {
            player.hits++;
            let badge = document.getElementById(`${player.id}-hits`);
            badge.innerText = `${player.hits} HITS`;
            badge.style.display = 'block';
            setTimeout(() => { badge.style.display = 'none'; }, 1000);
        }

        function animateRemote(anim) {
            remotePlayer.el.classList.add(anim);
            setTimeout(() => { remotePlayer.el.classList.remove('punching', 'combo1', 'combo2', 'special-anim'); }, 200);
        }

        function sendState() {
            if(!conn) return;
            conn.send({
                type: 'status',
                health: localPlayer.health,
                myHealth: remotePlayer.health,
                sp: localPlayer.sp,
                stun: localPlayer.isStunned
            });
        }

        function requestPause() { if(conn) conn.send({type: 'pause'}); isPaused = true; document.getElementById('pause-menu').classList.remove('hidden'); }
        function requestResume() { if(conn) conn.send({type: 'resume'}); isPaused = false; document.getElementById('pause-menu').classList.add('hidden'); gameLoop(); }
        function requestReset() { if(conn) conn.send({type: 'reset'}); resetState(); }

        function resetState() {
            localPlayer.health = 100; localPlayer.sp = 0; localPlayer.isStunned = false; localPlayer.x = isHost ? 150 : 700; localPlayer.y = 0;
            remotePlayer.health = 100; remotePlayer.sp = 0; remotePlayer.isStunned = false; remotePlayer.x = isHost ? 700 : 150; remotePlayer.y = 0;
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('game-over-menu').classList.add('hidden');
            isPaused = false; gameActive = true; gameLoop();
        }

        function gameLoop() {
            if (!gameActive || isPaused) return;

            // Física Local Independente (Garante fluidez total no pulo e andada)
            if (!localPlayer.isStunned) {
                if (touch.left) { localPlayer.vx = -config.speed; localPlayer.direction = -1; }
                else if (touch.right) { localPlayer.vx = config.speed; localPlayer.direction = 1; }
                else { localPlayer.vx *= 0.7; }
            } else { localPlayer.vx = 0; }

            localPlayer.vy += config.gravity;
            localPlayer.x += localPlayer.vx;
            localPlayer.y -= localPlayer.vy;

            let containerWidth = document.getElementById('game-container').offsetWidth;
            if (localPlayer.y <= 0) { localPlayer.y = 0; localPlayer.vy = 0; localPlayer.isJumping = false; }
            if (localPlayer.x < 0) localPlayer.x = 0;
            if (localPlayer.x > containerWidth - 60) localPlayer.x = containerWidth - 60;

            // Envia dados de posição leves em tempo real
            if (conn) conn.send({ type: 'move', x: localPlayer.x, y: localPlayer.y, dir: localPlayer.direction });

            // Renderiza ambos os personagens baseado em porcentagem na tela
            localPlayer.el.style.left = `${localPlayer.x}px`;
            localPlayer.el.style.transform = `translateY(${-localPlayer.y}px) scaleX(${localPlayer.direction})`;
            localPlayer.el.classList.toggle('stunned', localPlayer.isStunned);

            remotePlayer.el.style.left = `${remotePlayer.x}px`;
            remotePlayer.el.style.transform = `translateY(${-remotePlayer.y}px) scaleX(${remotePlayer.direction})`;
            remotePlayer.el.classList.toggle('stunned', remotePlayer.isStunned);

            // Interface
            document.getElementById('p1-health').style.width = `${localPlayer.health}%`;
            document.getElementById('p2-health').style.width = `${remotePlayer.health}%`;
            document.getElementById('p1-sp').style.width = `${localPlayer.sp}%`;
            document.getElementById('p2-sp').style.width = `${remotePlayer.sp}%`;
            document.getElementById('btn-sp').style.display = localPlayer.sp >= 100 ? 'flex' : 'none';

            if (localPlayer.health <= 0 || remotePlayer.health <= 0) {
                gameActive = false;
                document.getElementById('winner-text').innerText = localPlayer.health <= 0 ? "DERROTA!" : "VITÓRIA!";
                document.getElementById('game-over-menu').classList.remove('hidden');
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        init();
    </script>
</body>
</html>
