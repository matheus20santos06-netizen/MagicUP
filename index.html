<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Arena Ultimate Edition P2P</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --game-scale: 1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container Principal com controle de escala dinâmico via CSS */
        #game-wrapper {
            position: relative;
            width: 1024px;
            height: 576px;
            transform: scale(var(--game-scale));
            transform-origin: center center;
            transition: transform 0.1s ease;
        }

        #game-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0f001a, #2b002b, #0f001a);
            border: 4px solid #333;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .scenery { position: absolute; width: 100%; height: 100%; bottom: 0; }
        .floor {
            position: absolute;
            bottom: 0; width: 100%; height: 20%;
            background: #151515;
            border-top: 6px solid #ff0055;
            box-shadow: 0 -5px 15px rgba(255, 0, 85, 0.4);
        }

        /* HUD */
        .hud {
            position: absolute;
            top: 10px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 20px; z-index: 10;
        }

        .player-block { width: 42%; }
        .bar-container {
            background: #333; border: 2px solid #fff; height: 22px; margin-bottom: 4px; position: relative;
        }
        .health-bar { width: 100%; height: 100%; background: #00ff00; transition: width 0.1s ease; }
        .sp-container { background: #222; border: 1px solid #aaa; height: 8px; position: relative; }
        .sp-bar { width: 0%; height: 100%; background: #00ffff; transition: width 0.2s; }

        .player-info { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; letter-spacing: 1px; }
        .hit-counter { font-size: 1.4rem; color: #ffcc00; font-weight: bold; display: none; text-shadow: 0 0 5px #000; animation: pulse 0.1s ease-in-out; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Personagens em CSS Puro */
        .player {
            position: absolute; width: 60px; height: 110px; bottom: 20%; display: flex; justify-content: center; align-items: center;
            transition: opacity 0.1s;
        }

        .body-sprite { position: relative; width: 100%; height: 100%; }
        .head { width: 30px; height: 30px; border-radius: 50%; position: absolute; top: 0; left: 15px; border: 2px solid #fff; }
        .torso { width: 40px; height: 50px; position: absolute; top: 30px; left: 10px; border-radius: 8px; border: 2px solid #fff; }
        .arm { width: 32px; height: 12px; background: #fff; position: absolute; top: 38px; left: 35px; transform-origin: left center; transition: 0.05s; border-radius: 4px; }
        .leg { width: 12px; height: 30px; background: #fff; position: absolute; bottom: 0; }
        .leg.left { left: 12px; }
        .leg.right { left: 36px; }

        #p1 .head, #p1 .torso { background: #ff0055; box-shadow: 0 0 10px #ff0055; }
        #p1 .arm, #p1 .leg { background: #ff4081; }
        #p2 .head, #p2 .torso { background: #00e5ff; box-shadow: 0 0 10px #00e5ff; }
        #p2 .arm, #p2 .leg { background: #80f3ff; }
        #p2 .arm { left: auto; right: 35px; transform-origin: right center; }

        /* Animações e Estados Especiais de Luta */
        .punching .arm { transform: scaleX(1.9) rotate(-10deg); background: #fff !important; }
        .combo1 .arm { transform: scaleX(2.4) rotate(20deg); background: #ffcc00 !important; box-shadow: 0 0 8px #ffcc00; }
        .combo2 .arm { transform: scaleY(2.2) scaleX(1.6) translateY(6px); background: #00ff00 !important; box-shadow: 0 0 8px #00ff00; }
        .special-anim .arm { transform: scaleX(3.5) rotate(-25deg); background: #ff00ff !important; box-shadow: 0 0 20px #ff00ff; }
        .stunned { opacity: 0.6; transform: skewX(-20deg) rotate(5deg) !important; filter: grayscale(50%); }

        /* Camada de Controles Touch */
        .controls-layer {
            position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; pointer-events: none; z-index: 50;
        }
        .touch-btn {
            width: 65px; height: 65px; background: rgba(255, 255, 255, 0.12); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.2rem; color: #fff; pointer-events: auto;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.92); }
        .d-pad, .action-pad { display: flex; gap: 12px; }
        #btn-sp { background: rgba(255, 0, 255, 0.2); border-color: rgba(255, 0, 255, 0.6); display: none; font-size: 0.9rem; color: #ff00ff; text-shadow: 0 0 5px #ff00ff; font-weight: 900; }

        .pause-trigger {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 44px; height: 44px;
            background: rgba(255,255,255,0.1); border: 1px solid #fff; border-radius: 5px; display: flex; justify-content: center; align-items: center; z-index: 60; font-size: 1.2rem; cursor: pointer;
        }

        /* Menus */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.96);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); padding: 15px;
        }
        .hidden { display: none !important; }
        h1 { font-size: 2.5rem; color: #ff0055; text-shadow: 0 0 10px #ff0055; margin-bottom: 15px; text-align: center; font-weight: 900; }
        h2 { font-size: 1.8rem; color: #00e5ff; margin-bottom: 10px; }
        p { margin-bottom: 5px; font-size: 0.9rem; text-align: center; }
        
        .btn { padding: 12px 28px; font-size: 1rem; background: transparent; color: #fff; border: 2px solid #fff; cursor: pointer; margin: 8px; font-family: inherit; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #fff; color: #000; }
        
        .lobby-box { background: #161616; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; margin: 8px; width: 92%; max-width: 380px; }
        .lobby-box input { width: 100%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid #555; color: #fff; text-align: center; font-size: 1.1rem; font-family: inherit; }

        /* Slider de ajuste de tela no menu */
        .scale-panel {
            display: flex; flex-direction: column; align-items: center; width: 100%; margin: 10px 0;
        }
        .scale-panel input[type="range"] {
            width: 80%; max-width: 300px; height: 8px; accent-color: #ff0055; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-container">
            <div class="scenery"><div class="floor"></div></div>
            <div class="pause-trigger" onclick="requestPause()">⏸</div>

            <div class="hud">
                <div class="player-block">
                    <div class="player-info" id="p1-tag">P1 (Você)</div>
                    <div class="bar-container"><div id="p1-health" class="health-bar"></div></div>
                    <div class="sp-container"><div id="p1-sp" class="sp-bar"></div></div>
                    <div id="p1-hits" class="hit-counter">0 HITS</div>
                </div>
                <div class="player-block">
                    <div class="player-info" id="p2-tag">P2 (Rival)</div>
                    <div class="bar-container"><div id="p2-health" class="health-bar" style="float: right;"></div></div>
                    <div class="sp-container"><div id="p2-sp" class="sp-bar" style="float: right;"></div></div>
                    <div id="p2-hits" class="hit-counter" style="text-align: right;">0 HITS</div>
                </div>
            </div>

            <div id="p1" class="player" style="left: 150px;"><div class="body-sprite"><div class="head"></div><div class="torso"></div><div class="arm"></div><div class="leg left"></div><div class="leg right"></div></div></div>
            <div id="p2" class="player" style="left: 750px;"><div class="body-sprite"><div class="head"></div><div class="torso"></div><div class="arm"></div><div class="leg left"></div><div class="leg right"></div></div></div>

            <div class="controls-layer">
                <div class="d-pad">
                    <div class="touch-btn" id="btn-left">◀</div>
                    <div class="touch-btn" id="btn-jump">▲</div>
                    <div class="touch-btn" id="btn-right">▶</div>
                </div>
                <div class="action-pad">
                    <div class="touch-btn" id="btn-sp">SP</div>
                    <div class="touch-btn" id="btn-low" style="background: rgba(0, 229, 255, 0.15);">B</div>
                    <div class="touch-btn" id="btn-high" style="background: rgba(255, 0, 85, 0.15);">C</div>
                </div>
            </div>

            <div id="main-menu" class="screen">
                <h1>RETRO ARENA P2P</h1>
                
                <div class="lobby-box scale-panel">
                    <p style="color: #ffcc00; font-weight: bold;">Ajustar Tamanho da Tela (Zoom):</p>
                    <input type="range" id="screen-scale-slider" min="0.4" max="1.5" step="0.05" value="1" oninput="adjustGameScale(this.value)">
                </div>

                <p id="status-text" style="color: #00ffcc; font-weight: bold; margin-top: 5px;">Iniciando PeerJS...</p>
                
                <div class="lobby-box">
                    <p>ID da sua Sala (Diga ao seu amigo):</p>
                    <input type="text" id="my-id" readonly onclick="this.select()">
                </div>
                <div class="lobby-box">
                    <p>Conectar ao ID do seu amigo:</p>
                    <input type="text" id="peer-id-input" placeholder="Cole o ID aqui">
                    <button class="btn" onclick="connectToPeer()">CONECTAR WLAN</button>
                </div>
            </div>

            <div id="pause-menu" class="screen hidden">
                <h1>JOGO PAUSADO</h1>
                
                <div class="lobby-box scale-panel">
                    <p style="color: #ffcc00;">Reajustar Tamanho da Tela:</p>
                    <input type="range" id="pause-scale-slider" min="0.4" max="1.5" step="0.05" value="1" oninput="adjustGameScale(this.value)">
                </div>

                <button class="btn" onclick="requestResume()">RETOMAR ARENA</button>
                <button class="btn" onclick="requestReset()">REINICIAR LUTA</button>
            </div>

            <div id="game-over-menu" class="screen hidden">
                <h1 id="winner-text">FIM DE JOGO</h1>
                <button class="btn" onclick="requestReset()">REINICIAR PARTIDA</button>
            </div>
        </div>
    </div>

    <script>
        const config = { gravity: 0.6, speed: 6, width: 1024 };
        
        let localPlayer = { id: 'p1', el: document.getElementById('p1'), x: 150, y: 0, vx: 0, vy: 0, isJumping: false, health: 100, sp: 0, direction: 1, lastKeys: [], cooldown: false, hits: 0, isStunned: false };
        let remotePlayer = { id: 'p2', el: document.getElementById('p2'), x: 750, y: 0, health: 100, sp: 0, direction: -1, hits: 0, isStunned: false };

        let peer = null, conn = null, isHost = false, gameActive = false, isPaused = false;
        let touch = { left: false, right: false };

        // SINTETIZADOR DE ÁUDIO REAL-TIME (Web Audio API) - Sem lag e sem arquivos externos
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            let now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'jump') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(350, now + 0.15);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'punch') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.linearRampToValueAtTime(30, now + 0.08);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'combo') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(250, now);
                osc.frequency.setValueAtTime(400, now + 0.06);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                osc.start(now); osc.stop(now + 0.12);
            } else if (type === 'special') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.4);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        // Sistema de Controle de Escala Dinâmico (Perfeito para o Galaxy A02)
        function adjustGameScale(value) {
            document.documentElement.style.setProperty('--game-scale', value);
            document.getElementById('screen-scale-slider').value = value;
            document.getElementById('pause-scale-slider').value = value;
        }

        // Auto ajuste inicial baseado na tela do aparelho do usuário
        function autoScale() {
            let widthScale = window.innerWidth / 1040;
            let heightScale = window.innerHeight / 600;
            let bestScale = Math.min(widthScale, heightScale, 1.2);
            if(bestScale < 0.5) bestScale = 0.5;
            adjustGameScale(bestScale);
        }

        function initP2P() {
            peer = new Peer();
            peer.on('open', id => {
                document.getElementById('my-id').value = id;
                document.getElementById('status-text').innerText = "Sala pronta! Aguardando rival...";
            });
            peer.on('connection', connection => {
                conn = connection; isHost = true; setupConnection();
            });
            setupTouch();
            autoScale();
            window.addEventListener('resize', autoScale);
        }

        function connectToPeer() {
            initAudio();
            playSound('click');
            let targetId = document.getElementById('peer-id-input').value.trim();
            if(!targetId) return;
            document.getElementById('status-text').innerText = "Conectando via WLAN...";
            conn = peer.connect(targetId);
            isHost = false;
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                initAudio();
                document.getElementById('main-menu').classList.add('hidden');
                document.getElementById('p1-tag').innerText = isHost ? "P1 (Você)" : "P2 (Você)";
                document.getElementById('p2-tag').innerText = isHost ? "P2 (Rival)" : "P1 (Rival)";
                gameActive = true;
                gameLoop();
            });

            conn.on('data', data => {
                if (data.type === 'move') {
                    remotePlayer.x = data.x;
                    remotePlayer.y = data.y;
                    remotePlayer.direction = data.dir;
                }
                if (data.type === 'status') {
                    remotePlayer.health = data.health;
                    remotePlayer.sp = data.sp;
                    remotePlayer.isStunned = data.stun;
                    localPlayer.health = data.myHealth; // Garante consistência exata do HP
                }
                if (data.type === 'action') {
                    animateRemote(data.anim);
                    if(data.hit) {
                        showHitCounter(remotePlayer);
                        playSound(data.anim.includes('combo') ? 'combo' : 'punch');
                    }
                }
                if (data.type === 'pause') { isPaused = true; document.getElementById('pause-menu').classList.remove('hidden'); }
                if (data.type === 'resume') { isPaused = false; document.getElementById('pause-menu').classList.add('hidden'); gameLoop(); }
                if (data.type === 'reset') { resetState(); }
            });
        }

        function setupTouch() {
            const bind = (id, start, end) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); start(); });
                el.addEventListener('touchend', e => { e.preventDefault(); end(); });
            };
            bind('btn-left', () => touch.left = true, () => touch.left = false);
            bind('btn-right', () => touch.right = true, () => touch.right = false);
            bind('btn-jump', () => { 
                if(!localPlayer.isJumping && !localPlayer.isStunned && gameActive) { 
                    localPlayer.vy = -13; 
                    localPlayer.isJumping = true; 
                    playSound('jump');
                } 
            }, () => {});
            
            bind('btn-low', () => handleAttack('baixo'), () => {});
            bind('btn-high', () => handleAttack('cima'), () => {});
            bind('btn-sp', () => handleSpecial(), () => {});
        }

        function handleAttack(type) {
            if (localPlayer.cooldown || localPlayer.isStunned || !gameActive || isPaused) return;
            localPlayer.cooldown = true;
            
            localPlayer.lastKeys.push({ type: type, time: Date.now() });
            if (localPlayer.lastKeys.length > 5) localPlayer.lastKeys.shift();

            let anim = 'punching';
            let damage = 4;
            let audioType = 'punch';
            
            let comboText = checkCombos();

            if (comboText) {
                if(comboText === 'TRIPLO') { anim = 'combo1'; damage = 12; audioType = 'combo'; }
                if(comboText === 'GANCHO') { anim = 'combo2'; damage = 10; audioType = 'combo'; }
            }

            localPlayer.el.classList.add(anim);
            
            // Verificação matemática precisa de Hitbox
            let hitRegistered = false;
            let distance = Math.abs(localPlayer.x - remotePlayer.x);
            let reach = anim.includes('combo') ? 110 : 75;
            
            if (distance < reach && Math.abs(localPlayer.y - remotePlayer.y) < 60) {
                hitRegistered = true;
                remotePlayer.health -= damage;
                localPlayer.sp = Math.min(100, localPlayer.sp + 14);
                showHitCounter(localPlayer);
                playSound(audioType);
            } else {
                localPlayer.hits = 0;
                document.getElementById('p1-hits').style.display = 'none';
                playSound('punch'); // Som de vento se errar
            }

            if(conn) conn.send({ type: 'action', anim: anim, hit: hitRegistered });
            sendState();

            setTimeout(() => {
                localPlayer.el.classList.remove('punching', 'combo1', 'combo2');
                localPlayer.cooldown = false;
            }, 180);
        }

        function checkCombos() {
            const now = Date.now();
            localPlayer.lastKeys = localPlayer.lastKeys.filter(k => now - k.time < 1000);
            let seq = localPlayer.lastKeys.map(k => k.type).join('-');
            
            if (seq.endsWith('cima-cima-cima') || seq.endsWith('baixo-baixo-baixo')) return 'TRIPLO';
            if (seq.endsWith('baixo-cima')) return 'GANCHO';
            return null;
        }

        function handleSpecial() {
            if(localPlayer.sp < 100 || localPlayer.isStunned || isPaused) return;
            localPlayer.sp = 0;
            localPlayer.cooldown = true;
            
            localPlayer.el.classList.add('special-anim');
            playSound('special');
            
            let distance = Math.abs(localPlayer.x - remotePlayer.x);
            if (distance < 140 && Math.abs(localPlayer.y - remotePlayer.y) < 60) {
                remotePlayer.isStunned = true; // ATIVA PARALISIA REAL (STUN) NO INIMIGO
                if(conn) conn.send({ type: 'action', anim: 'special-anim', hit: true });
                
                let attackTicks = 0;
                let specialComboInterval = setInterval(() => {
                    remotePlayer.health -= 6;
                    showHitCounter(localPlayer);
                    playSound('punch');
                    sendState();
                    attackTicks++;
                    
                    if(attackTicks >= 6) {
                        clearInterval(specialComboInterval);
                        remotePlayer.isStunned = false; // Libera o rival após o término do especial
                        localPlayer.el.classList.remove('special-anim');
                        localPlayer.cooldown = false;
                        sendState();
                    }
                }, 220);
            } else {
                if(conn) conn.send({ type: 'action', anim: 'special-anim', hit: false });
                setTimeout(() => {
                    localPlayer.el.classList.remove('special-anim');
                    localPlayer.cooldown = false;
                }, 500);
            }
            sendState();
        }

        function showHitCounter(player) {
            player.hits++;
            let badge = document.getElementById(`${player.id}-hits`);
            badge.innerText = `${player.hits} HITS`;
            badge.style.display = 'block';
            
            // Remove o contador se ficar muito tempo sem bater
            clearTimeout(player.hitTimeout);
            player.hitTimeout = setTimeout(() => { badge.style.display = 'none'; player.hits = 0; }, 1200);
        }

        function animateRemote(anim) {
            remotePlayer.el.classList.add(anim);
            setTimeout(() => { remotePlayer.el.classList.remove('punching', 'combo1', 'combo2', 'special-anim'); }, 200);
        }

        function sendState() {
            if(!conn) return;
            conn.send({
                type: 'status',
                health: localPlayer.health,
                myHealth: remotePlayer.health,
                sp: localPlayer.sp,
                stun: localPlayer.isStunned
            });
        }

        function requestPause() { playSound('click'); if(conn) conn.send({type: 'pause'}); isPaused = true; document.getElementById('pause-menu').classList.remove('hidden'); }
        function requestResume() { playSound('click'); if(conn) conn.send({type: 'resume'}); isPaused = false; document.getElementById('pause-menu').classList.add('hidden'); gameLoop(); }
        function requestReset() { playSound('click'); if(conn) conn.send({type: 'reset'}); resetState(); }

        function resetState() {
            localPlayer.health = 100; localPlayer.sp = 0; localPlayer.isStunned = false; localPlayer.x = isHost ? 150 : 750; localPlayer.y = 0; localPlayer.hits = 0;
            remotePlayer.health = 100; remotePlayer.sp = 0; remotePlayer.isStunned = false; remotePlayer.x = isHost ? 750 : 150; remotePlayer.y = 0; remotePlayer.hits = 0;
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('game-over-menu').classList.add('hidden');
            document.getElementById('p1-hits').style.display = 'none';
            document.getElementById('p2-hits').style.display = 'none';
            isPaused = false; gameActive = true; gameLoop();
        }

        function gameLoop() {
            if (!gameActive || isPaused) return;

            // Física Local Fluida e Instantânea (Independente do processamento do outro tablet)
            if (!localPlayer.isStunned) {
                if (touch.left) { localPlayer.vx = -config.speed; localPlayer.direction = -1; }
                else if (touch.right) { localPlayer.vx = config.speed; localPlayer.direction = 1; }
                else { localPlayer.vx *= 0.72; }
            } else { localPlayer.vx = 0; }

            localPlayer.vy += config.gravity;
            localPlayer.x += localPlayer.vx;
            localPlayer.y -= localPlayer.vy;

            if (localPlayer.y <= 0) { localPlayer.y = 0; localPlayer.vy = 0; localPlayer.isJumping = false; }
            if (localPlayer.x < 0) localPlayer.x = 0;
            if (localPlayer.x > config.width - 60) localPlayer.x = config.width - 60;

            // Transmissão levíssima de dados de movimento para evitar gargalo de rede na WLAN
            if (conn) conn.send({ type: 'move', x: localPlayer.x, y: localPlayer.y, dir: localPlayer.direction });

            // Renderização Gráfica Dinâmica
            localPlayer.el.style.left = `${localPlayer.x}px`;
            localPlayer.el.style.transform = `translateY(${-localPlayer.y}px) scaleX(${localPlayer.direction})`;
            localPlayer.el.classList.toggle('stunned', localPlayer.isStunned);

            remotePlayer.el.style.left = `${remotePlayer.x}px`;
            remotePlayer.el.style.transform = `translateY(${-remotePlayer.y}px) scaleX(${remotePlayer.direction})`;
            remotePlayer.el.classList.toggle('stunned', remotePlayer.isStunned);

            // Atualização da HUD em tempo real
            document.getElementById('p1-health').style.width = `${localPlayer.health}%`;
            document.getElementById('p2-health').style.width = `${remotePlayer.health}%`;
            document.getElementById('p1-sp').style.width = `${localPlayer.sp}%`;
            document.getElementById('p2-sp').style.width = `${remotePlayer.sp}%`;
            document.getElementById('btn-sp').style.display = localPlayer.sp >= 100 ? 'flex' : 'none';

            // Tela de Fim de Jogo para Ambos
            if (localPlayer.health <= 0 || remotePlayer.health <= 0) {
                gameActive = false;
                document.getElementById('winner-text').innerText = localPlayer.health <= 0 ? "FALHA - VOCÊ PERDEU!" : "VITÓRIA EXTREMA!";
                document.getElementById('game-over-menu').classList.remove('hidden');
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        initP2P();
    </script>
</body>
</html>
