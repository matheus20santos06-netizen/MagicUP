<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniCraft Multiplayer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #1a1a1a; user-select: none; }
        #gameCanvas { background: #5c8124; display: block; }
        .pixel-font { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen overflow-hidden">

    <div id="lobby" class="absolute z-50 bg-gray-900 p-8 rounded-lg border-4 border-gray-700 text-white text-center max-w-sm w-full pixel-font">
        <h1 class="text-3xl mb-4 text-green-500 uppercase tracking-wider">MiniCraft P2P</h1>
        <input id="playerName" type="text" placeholder="Seu Nome" value="Player" class="w-full p-2 mb-4 bg-gray-800 border-2 border-gray-600 rounded text-center">
        <div class="mb-4">
            <button onclick="startHost()" class="w-full bg-green-600 hover:bg-green-700 p-2 rounded mb-2 transition">Criar Sala (Host)</button>
            <div class="text-sm text-gray-400 my-1">OU</div>
            <input id="roomIdInput" type="text" placeholder="ID da Sala do Amigo" class="w-full p-2 mb-2 bg-gray-800 border-2 border-gray-600 rounded text-center text-sm">
            <button onclick="joinRoom()" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded transition">Entrar na Sala</button>
        </div>
        <p id="lobbyStatus" class="text-xs text-yellow-500"></p>
    </div>

    <div id="hud" class="hidden absolute inset-0 pointer-events-none pixel-font text-white p-4 flex flex-col justify-between">
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="bg-black/60 p-3 rounded border border-gray-600">
                <p id="hudTime">Tempo: Dia</p>
                <p id="hudRoomId" class="text-xs text-gray-400 select-all">Sala ID: Copiando...</p>
            </div>
            <div class="relative w-32 h-32 bg-black/40 border-2 border-white rounded overflow-hidden">
                <canvas id="minimapCanvas" width="128" height="128" class="w-full h-full"></canvas>
            </div>
        </div>

        <div class="text-center">
            <p id="lookAtText" class="text-lg bg-black/40 px-2 py-1 rounded inline-block text-yellow-400"></p>
        </div>

        <div class="flex flex-col items-center gap-2 pointer-events-auto">
            <div class="flex items-center gap-2 bg-black/60 px-4 py-1 rounded">
                <span>❤️ Vida:</span>
                <div class="w-32 bg-gray-700 h-4 rounded overflow-hidden border border-gray-500">
                    <div id="healthBar" class="bg-red-600 h-full w-full transition-all"></div>
                </div>
            </div>
            <div id="hotbar" class="flex bg-gray-800/90 border-4 border-gray-600 p-1 gap-1 rounded shadow-2xl">
                </div>
        </div>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>

    <script>
        // --- CONFIGURAÇÕES DO JOGO ---
        const WORLD_SIZE = 2000;
        const VIEW_PADDING = 100;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimapCanvas');
        const mCtx = minimapCanvas.getContext('2d');

        // Estado do Jogo
        let player = { id: '', name: 'Player', x: 1000, y: 1000, size: 24, speed: 4, health: 100, maxHealth: 100, color: '#3b82f6' };
        let players = {}; // Outros jogadores online
        let keys = {};
        let inventory = { 'Madeira': 0, 'Pedra': 0, 'Carvão': 0, 'Carne': 0 };
        let currentSlot = 'Madeira';
        
        let worldObjects = [];
        let mobs = [];
        let isNight = false;
        let gameTicks = 0;

        // Redes (PeerJS)
        let peer = null;
        let conn = null; // Se for cliente, guarda a conexão com o Host
        let connections = []; // Se for host, guarda conexões com clientes
        let isHost = false;

        // Inicializa inputs do teclado
        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(['1','2','3','4'].includes(e.key)) selectSlotByIndex(e.key); });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('resize', resizeCanvas);

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // --- MULTIPLAYER LOGIC (PEERJS) ---
        function initPeer(id = null) {
            peer = new Peer(id, { debug: 1 });
            
            peer.on('open', (id) => {
                player.id = id;
                document.getElementById('hudRoomId').innerText = `Sala ID: ${id}`;
                if (isHost) {
                    setupHostLogic();
                    startGame();
                } else {
                    // Se cliente, conecta ao host
                    conn = peer.connect(document.getElementById('roomIdInput').value.trim());
                    setupClientLogic();
                }
            });

            peer.on('error', err => {
                alert('Erro na conexão: ' + err.type);
                location.reload();
            });
        }

        function startHost() {
            player.name = document.getElementById('playerName').value || 'Host';
            isHost = true;
            document.getElementById('lobbyStatus').innerText = "Criando sala...";
            initPeer(); // Cria ID aleatório
        }

        function joinRoom() {
            const targetId = document.getElementById('roomIdInput').value.trim();
            if(!targetId) return alert('Digite o ID da sala!');
            player.name = document.getElementById('playerName').value || 'Client';
            isHost = false;
            document.getElementById('lobbyStatus').innerText = "Conectando ao amigo...";
            initPeer();
        }

        function setupHostLogic() {
            // Gerar mapa inicial
            generateWorld();
            
            peer.on('connection', (connection) => {
                connections.push(connection);
                
                // Envia o mapa atual pro novo jogador
                connection.on('open', () => {
                    connection.send({ type: 'init_world', worldObjects, mobs, isNight });
                });

                connection.on('data', (data) => {
                    if (data.type === 'move') {
                        players[data.id] = data.playerData;
                        broadcast({ type: 'players_update', players });
                    }
                    if (data.type === 'object_damage') {
                        damageObject(data.objIndex, data.damage);
                    }
                    if (data.type === 'mob_damage') {
                        damageMob(data.mobIndex, data.damage);
                    }
                    if (data.type === 'feed_animal') {
                        feedAnimal(data.mobIndex);
                    }
                });

                connection.on('close', () => {
                    connections = connections.filter(c => c !== connection);
                });
            });
        }

        function setupClientLogic() {
            conn.on('open', () => {
                startGame();
            });

            conn.on('data', (data) => {
                if (data.type === 'init_world') {
                    worldObjects = data.worldObjects;
                    mobs = data.mobs;
                    isNight = data.isNight;
                }
                if (data.type === 'players_update') {
                    players = data.players;
                }
                if (data.type === 'world_sync') {
                    worldObjects = data.worldObjects;
                    mobs = data.mobs;
                    isNight = data.isNight;
                }
            });
        }

        function broadcast(data) {
            if (isHost) {
                connections.forEach(c => {
                    if(c.open) c.send(data);
                });
            } else if (conn && conn.open) {
                conn.send(data);
            }
        }

        // --- GERADOR DE MUNDO ---
        function generateWorld() {
            worldObjects = [];
            // Acampamento Central (Livre de árvores grandes no meio)
            worldObjects.push({ type: 'Fogueira', x: 1000, y: 1000, hp: 999, maxHp: 999, size: 30, color: '#ea580c' });

            const types = [
                { type: 'Árvore', color: '#15803d', hp: 3, res: 'Madeira', size: 20 },
                { type: 'Pedra', color: '#78716c', hp: 4, res: 'Pedra', size: 18 },
                { type: 'Carvão', color: '#292524', hp: 5, res: 'Carvão', size: 16 }
            ];

            for (let i = 0; i < 60; i++) {
                let t = types[Math.floor(Math.random() * types.length)];
                let x = Math.random() * (WORLD_SIZE - 200) + 100;
                let y = Math.random() * (WORLD_SIZE - 200) + 100;
                // Evita spawn em cima da fogueira
                if (Math.hypot(x - 1000, y - 1000) < 100) continue;
                worldObjects.push({ ...t, x, y });
            }

            // Spawn Animais Iniciais
            for(let i=0; i<8; i++) {
                spawnMob('Vaca', Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE);
            }
        }

        function spawnMob(type, x, y) {
            if(type === 'Vaca') {
                mobs.push({ type: 'Vaca', x, y, hp: 4, maxHp: 4, color: '#a16207', size: 18, targetX: x, targetY: y, speed: 1 });
            } else {
                mobs.push({ type: 'Zumbi', x, y, hp: 5, maxHp: 5, color: '#166534', size: 20, speed: 2 });
            }
        }

        // --- GAME LOOP & LOGIC ---
        function startGame() {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            canvas.classList.remove('hidden');
            resizeCanvas();
            renderHotbar();
            requestAnimationFrame(gameLoop);
        }

        function selectSlotByIndex(num) {
            const idx = parseInt(num) - 1;
            const keys = Object.keys(inventory);
            if(keys[idx]) {
                currentSlot = keys[idx];
                renderHotbar();
            }
        }

        function renderHotbar() {
            const hotbar = document.getElementById('hotbar');
            hotbar.innerHTML = '';
            Object.keys(inventory).forEach((item, i) => {
                const activeClass = currentSlot === item ? 'border-yellow-400 bg-gray-700' : 'border-transparent';
                hotbar.innerHTML += `
                    <div class="border-2 ${activeClass} p-2 text-center min-w-[70px] rounded bg-gray-900/80">
                        <div class="text-xs text-gray-400">${i+1}</div>
                        <div class="text-sm font-bold">${item}</div>
                        <div class="text-xs text-green-400">x${inventory[item]}</div>
                    </div>
                `;
            });
        }

        function update() {
            // Movimentação do Jogador
            let moveX = 0;
            let moveY = 0;
            if (keys['w'] || keys['arrowup']) moveY -= player.speed;
            if (keys['s'] || keys['arrowdown']) moveY += player.speed;
            if (keys['a'] || keys['arrowleft']) moveX -= player.speed;
            if (keys['d'] || keys['arrowright']) moveX += player.speed;

            player.x = Math.max(20, Math.min(WORLD_SIZE - 20, player.x + moveX));
            player.y = Math.max(20, Math.min(WORLD_SIZE - 20, player.y + moveY));

            // Ciclo Dia/Noite e Lógica de Host
            if (isHost) {
                gameTicks++;
                if (gameTicks % 1200 === 0) { // Alterna a cada ~20 segundos
                    isNight = !isNight;
                    if (isNight) {
                        // Spawn zumbis nas bordas à noite
                        for (let i = 0; i < 4; i++) {
                            spawnMob('Zumbi', Math.random() > 0.5 ? 50 : WORLD_SIZE - 50, Math.random() * WORLD_SIZE);
                        }
                    } else {
                        // Limpa zumbis de dia
                        mobs = mobs.filter(m => m.type !== 'Zumbi');
                    }
                }

                // Mover Mobs
                mobs.forEach(mob => {
                    if (mob.type === 'Vaca') {
                        // Anda aleatoriamente
                        if (Math.random() < 0.02 || Math.hypot(mob.x - mob.targetX, mob.y - mob.targetY) < 10) {
                            mob.targetX = Math.max(50, Math.min(WORLD_SIZE-50, mob.x + (Math.random()*200 - 100)));
                            mob.targetY = Math.max(50, Math.min(WORLD_SIZE-50, mob.y + (Math.random()*200 - 100)));
                        }
                        let angle = Math.atan2(mob.targetY - mob.y, mob.targetX - mob.x);
                        mob.x += Math.cos(angle) * mob.speed;
                        mob.y += Math.sin(angle) * mob.speed;
                    } else if (mob.type === 'Zumbi') {
                        // Persegue o jogador mais perto
                        let target = player;
                        let minDist = Math.hypot(player.x - mob.x, player.y - mob.y);
                        
                        Object.values(players).forEach(p => {
                            let d = Math.hypot(p.x - mob.x, p.y - mob.y);
                            if(d < minDist) { minDist = d; target = p; }
                        });

                        let angle = Math.atan2(target.y - mob.y, target.x - mob.x);
                        mob.x += Math.cos(angle) * mob.speed;
                        mob.y += Math.sin(angle) * mob.speed;

                        // Dar dano se encostar no player local
                        if (target === player && minDist < (player.size/2 + mob.size/2)) {
                            if(Math.random() < 0.05) { // taxa do dano
                                player.health = Math.max(0, player.health - 5);
                                if(player.health <= 0) {
                                    alert("Você morreu para um Zumbi!");
                                    player.health = 100;
                                    player.x = 1000; player.y = 1000; // Respawn no acampamento
                                }
                            }
                        }
                    }
                });

                // Envia sincronização geral do mundo regularmente
                if(gameTicks % 5 === 0) {
                    broadcast({ type: 'world_sync', worldObjects, mobs, isNight });
                }
            }

            // Envia posição atual para os outros jogadores
            broadcast({ type: 'move', id: player.id, playerData: { x: player.x, y: player.y, name: player.name, health: player.health, color: player.color } });

            // Atualiza Interface de Elemento Focado (Olhado/Perto)
            let closestObj = null;
            let minDist = 60;
            worldObjects.forEach((obj, idx) => {
                let d = Math.hypot(player.x - obj.x, player.y - obj.y);
                if (d < minDist) { minDist = d; closestObj = { ...obj, idx, isMob: false }; }
            });
            mobs.forEach((mob, idx) => {
                let d = Math.hypot(player.x - mob.x, player.y - mob.y);
                if (d < minDist) { minDist = d; closestObj = { ...mob, idx, isMob: true }; }
            });

            const lookText = document.getElementById('lookAtText');
            if (closestObj) {
                lookText.innerText = `[Espaço] Interagir: ${closestObj.type} (HP: ${closestObj.hp}/${closestObj.maxHp || closestObj.hp})`;
                
                // Ação de Coleta / Interação (Espaço)
                if (keys[' '] && !keys['space_locked']) {
                    keys['space_locked'] = true; // Evita cliques contínuos ultra-rápidos
                    setTimeout(() => keys['space_locked'] = false, 250);

                    if (!closestObj.isMob) {
                        if (closestObj.type !== 'Fogueira') {
                            if (isHost) damageObject(closestObj.idx, 1);
                            else broadcast({ type: 'object_damage', objIndex: closestObj.idx, damage: 1 });
                            
                            // Coleta imediata client-side simulada para feedback suave
                            inventory[closestObj.res] = (inventory[closestObj.res] || 0) + 1;
                            renderHotbar();
                        }
                    } else {
                        if (closestObj.type === 'Vaca' && inventory['Madeira'] > 0) {
                            // Alimenta o animal usando madeira/recurso
                            if (isHost) feedAnimal(closestObj.idx);
                            else broadcast({ type: 'feed_animal', mobIndex: closestObj.idx });
                            inventory['Madeira']--;
                            player.health = Math.min(player.maxHealth, player.health + 20); // Cura o jogador
                            renderHotbar();
                        } else {
                            // Ataca Mobs (Zumbis)
                            if (isHost) damageMob(closestObj.idx, 1);
                            else broadcast({ type: 'mob_damage', mobIndex: closestObj.idx, damage: 1 });
                            if(closestObj.type === 'Vaca') inventory['Carne']++;
                            renderHotbar();
                        }
                    }
                }
            } else {
                lookText.innerText = '';
            }

            // UI Updates
            document.getElementById('hudTime').innerText = `Tempo: ${isNight ? '🌃 Noite (Cuidado!)' : '☀️ Dia'}`;
            document.getElementById('healthBar').style.width = `${player.health}%`;
        }

        // Funções de Modificação de Estado (Executadas no Host ou sincronizadas)
        function damageObject(idx, dmg) {
            if(!worldObjects[idx]) return;
            worldObjects[idx].hp -= dmg;
            if(worldObjects[idx].hp <= 0) worldObjects.splice(idx, 1);
        }

        function damageMob(idx, dmg) {
            if(!mobs[idx]) return;
            mobs[idx].hp -= dmg;
            if(mobs[idx].hp <= 0) mobs.splice(idx, 1);
        }

        function feedAnimal(idx) {
            if(!mobs[idx]) return;
            mobs[idx].hp = Math.min(mobs[idx].maxHp, mobs[idx].hp + 1);
        }

        // --- RENDERIZAÇÃO (CANVAS) ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Translação da Câmera focada no Jogador Principal
            let camX = canvas.width / 2 - player.x;
            let camY = canvas.height / 2 - player.y;
            ctx.save();
            ctx.translate(camX, camY);

            // Chão do Mapa / Limites
            ctx.fillStyle = isNight ? '#1e293b' : '#4d7c0f';
            ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 5;
            ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

            // Desenhar Recursos e Objetos do Cenário
            worldObjects.forEach(obj => {
                ctx.fillStyle = obj.color;
                ctx.fillRect(obj.x - obj.size/2, obj.y - obj.size/2, obj.size, obj.size);
                
                // Nome do Objeto
                ctx.fillStyle = '#ffffff';
                ctx.font = '10px Courier New';
                ctx.fillText(obj.type, obj.x - 15, obj.y - obj.size);
            });

            // Desenhar Mobs (Zumbis/Animais)
            mobs.forEach(mob => {
                ctx.fillStyle = mob.color;
                ctx.fillRect(mob.x - mob.size/2, mob.y - mob.size/2, mob.size, mob.size);

                // Vida do Mob
                ctx.fillStyle = 'red';
                ctx.fillRect(mob.x - 15, mob.y - mob.size - 5, 30, 4);
                ctx.fillStyle = 'green';
                ctx.fillRect(mob.x - 15, mob.y - mob.size - 5, (mob.hp / mob.maxHp) * 30, 4);
            });

            // Outros Jogadores Conectados
            Object.values(players).forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - player.size/2, p.y - player.size/2, player.size, player.size);
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px Courier New';
                ctx.fillText(p.name, p.x - 15, p.y - 20);
            });

            // Jogador Local (Você - Quadrado Azul)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
            
            // Tag de Nome Local
            ctx.fillStyle = '#fff';
            ctx.font = '12px Courier New';
            ctx.fillText(player.name, player.x - 15, player.y - 20);

            ctx.restore();

            // Desenhar MiniMapa
            drawMinimap();
        }

        function drawMinimap() {
            mCtx.fillStyle = '#22c55e';
            mCtx.fillRect(0, 0, 128, 128);

            // Escala do minimapa (128 pixels para o WORLD_SIZE)
            const scale = 128 / WORLD_SIZE;

            // Desenhar recursos em ponto minúsculo
            worldObjects.forEach(obj => {
                mCtx.fillStyle = obj.color;
                mCtx.fillRect(obj.x * scale, obj.y * scale, 3, 3);
            });

            // Outros players no minimapa
            Object.values(players).forEach(p => {
                mCtx.fillStyle = '#ef4444';
                mCtx.fillRect(p.x * scale, p.y * scale, 4, 4);
            });

            // Você no minimapa (Ponto Branco piscando)
            mCtx.fillStyle = '#ffffff';
            mCtx.fillRect(player.x * scale, player.y * scale, 5, 5);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
